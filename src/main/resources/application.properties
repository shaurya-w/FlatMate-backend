spring.application.name=mpr-backend-jan

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}
spring.config.import=optional:file:.env[.properties]

# ===============================
# DATABASE
# ===============================
# CRITICAL: Added prepareThreshold=0 to prevent PgBouncer "S_2" errors
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.pool-name=SpringHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# PgBouncer Compatibility: Re-enabling auto-commit for DDL execution
spring.datasource.hikari.auto-commit=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Disable features that conflict with PgBouncer's Transaction Mode
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=false

# ===============================
# LOGGING (Simplified Terminal)
# ===============================
# Hide Spring/Hibernate noise, show only your app logs and SQL
logging.level.root=WARN
logging.level.com.example.mpr_backend_jan=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=WARN

# ===============================
# SECURITY & COOKIES
# ===============================
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true

spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.devtools.restart.enabled=false

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
